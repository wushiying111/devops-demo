name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 测试任务
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m pytest test_app.py -v
  
  # 构建和推送镜像
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Get commit SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo:${{ steps.vars.outputs.sha_short }}
    
    - name: Verify
      run: |
        echo "✅ Images pushed:"
        echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo:latest"
        echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo:${{ steps.vars.outputs.sha_short }}"
